<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pacifico&family=Roboto:ital,wght@0,100..900;1,100..900&family=Shrikhand&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <link rel="icon" href="images/logo.png" />

    <title>Macfoods - Contact</title>
    <!-- <script src="script/script.js"></script> -->
</head>

<body class="">

    <section class="bg-[#0b0b0c] text-white pt-24 pb-12">

        <div class="max-w-7xl mx-auto px-6">

            <!-- Title -->
            <div class="text-center mb-8">
                <h2 class="text-3xl md:text-4xl font-semibold">
                    Nous contacter
                </h2>
                <p class="mt-4 text-gray-400 max-w-2xl mx-auto">
                    Retrouvez-nous, contactez-nous ou découvrez nos points de vente partenaires.
                </p>
            </div>
            <div class="max-w-7xl mx-auto mb-8 text-center">

                <!-- Social icons -->
                <div class="flex justify-center gap-6 mb-4 text-white">

                    <!-- Facebook -->
                    <a href="#" class="hover:text-[#9c0207] transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                            <path
                                d="M22 12A10 10 0 1 0 10.5 21.9v-7h-2.8v-2.9h2.8V9.4c0-2.8 1.7-4.3 4.2-4.3 1.2 0 2.5.2 2.5.2v2.7h-1.4c-1.4 0-1.9.9-1.9 1.8v2.2h3.2l-.5 2.9h-2.7v7A10 10 0 0 0 22 12z" />
                        </svg>
                    </a>

                    <!-- WhatsApp -->
                    <a href="#" class="hover:text-[#9c0207] transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                            <path
                                d="M20.5 3.5A11 11 0 0 0 3.7 17.3L2 22l4.8-1.7A11 11 0 1 0 20.5 3.5zm-8.5 17a9 9 0 0 1-4.6-1.3l-.3-.2-2.8 1 .9-2.7-.2-.3A9 9 0 1 1 12 20.5zm5-6.7c-.3-.2-1.6-.8-1.9-.9-.3-.1-.5-.2-.7.2s-.8.9-1 .9-.4 0-.7-.2a7.4 7.4 0 0 1-2.2-2c-.2-.3 0-.5.2-.7.2-.2.3-.4.5-.6.2-.2.2-.3.3-.5 0-.2 0-.4 0-.6s-.7-1.7-1-2.3c-.3-.6-.6-.5-.8-.5h-.7c-.2 0-.6.1-.9.5s-1.2 1.1-1.2 2.7 1.2 3.1 1.4 3.3c.2.2 2.4 3.7 5.8 5.2.8.3 1.5.5 2 .6.8.2 1.5.2 2 .1.6-.1 1.6-.7 1.8-1.3.2-.6.2-1.2.1-1.3-.1-.1-.3-.2-.6-.4z" />
                        </svg>
                    </a>

                    <!-- Email -->
                    <a href="#" class="hover:text-[#9c0207] transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                            <path d="M2 4h20v16H2V4zm10 9 10-6H2l10 6zm0 2L2 9v9h20V9l-10 6z" />
                        </svg>
                    </a>

                </div>
            </div>

            <!-- Grid -->
            <div class="grid lg:grid-cols-3 gap-10">

                <!-- MAP -->
                <div class="lg:col-span-2 rounded-2xl overflow-hidden border border-white/10">
                     <iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d1873.4707520769946!2d9.811528238466323!3d3.988804274710548!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zM8KwNTknMTkuNyJOIDnCsDQ4JzQ2LjEiRQ!5e1!3m2!1sfr!2scm!4v1694341233949!5m2!1sfr!2scm"
                  style="border:0; border-radius: 20px; width: 100%; height: 400px;"  allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" class="w-full h-100 border-0"></iframe>
                </div>

                <!-- RETAILERS -->
                <div class="bg-[#141415] rounded-2xl p-6 border border-white/10">

                    <h3 class="text-xl font-medium mb-6">
                        Points de vente
                    </h3>

                    <ul class="space-y-4 text-gray-400 text-sm">

                        <li>
                            <span class="text-white font-medium">Supermarché Central</span><br />
                            Yaoundé Centre
                        </li>

                        <li>
                            <span class="text-white font-medium">Marché Elig-Essono</span><br />
                            Yaoundé
                        </li>

                        <li>
                            <span class="text-white font-medium">Boutique Premium</span><br />
                            Douala
                        </li>

                    </ul>

                </div>

            </div>

            <!-- FORM -->
            <div class="mt-16 max-w-3xl mx-auto">

                <form class="bg-[#141415] p-8 rounded-2xl border border-white/10 space-y-6">

                    <div class="grid md:grid-cols-2 gap-6">

                        <input type="text" placeholder="Nom"
                            class="w-full px-4 py-3 rounded-lg bg-black/40 border border-white/10 focus:outline-none focus:border-[#9c0207]" />

                        <input type="email" placeholder="Email"
                            class="w-full px-4 py-3 rounded-lg bg-black/40 border border-white/10 focus:outline-none focus:border-[#9c0207]" />

                    </div>

                    <textarea placeholder="Votre message"
                        class="w-full px-4 py-3 h-32 rounded-lg bg-black/40 border border-white/10 focus:outline-none focus:border-[#9c0207]"></textarea>

                    <button class="w-full py-3 rounded-full bg-[#9c0207] hover:bg-red-700 transition-colors">
                        Envoyer le message
                    </button>

                </form>

            </div>

        </div>

    </section>

    <!-- FOOTER -->
    <footer class="bg-black border-t border-white/10 py-8">

        <div class="max-w-7xl mx-auto px-6 text-center">

            <!-- Social icons -->
            <div class="flex justify-center gap-6 mb-4 text-white">

                <!-- Facebook -->
                <a href="#" class="hover:text-[#9c0207] transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                        <path
                            d="M22 12A10 10 0 1 0 10.5 21.9v-7h-2.8v-2.9h2.8V9.4c0-2.8 1.7-4.3 4.2-4.3 1.2 0 2.5.2 2.5.2v2.7h-1.4c-1.4 0-1.9.9-1.9 1.8v2.2h3.2l-.5 2.9h-2.7v7A10 10 0 0 0 22 12z" />
                    </svg>
                </a>

                <!-- WhatsApp -->
                <a href="#" class="hover:text-[#9c0207] transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                        <path
                            d="M20.5 3.5A11 11 0 0 0 3.7 17.3L2 22l4.8-1.7A11 11 0 1 0 20.5 3.5zm-8.5 17a9 9 0 0 1-4.6-1.3l-.3-.2-2.8 1 .9-2.7-.2-.3A9 9 0 1 1 12 20.5zm5-6.7c-.3-.2-1.6-.8-1.9-.9-.3-.1-.5-.2-.7.2s-.8.9-1 .9-.4 0-.7-.2a7.4 7.4 0 0 1-2.2-2c-.2-.3 0-.5.2-.7.2-.2.3-.4.5-.6.2-.2.2-.3.3-.5 0-.2 0-.4 0-.6s-.7-1.7-1-2.3c-.3-.6-.6-.5-.8-.5h-.7c-.2 0-.6.1-.9.5s-1.2 1.1-1.2 2.7 1.2 3.1 1.4 3.3c.2.2 2.4 3.7 5.8 5.2.8.3 1.5.5 2 .6.8.2 1.5.2 2 .1.6-.1 1.6-.7 1.8-1.3.2-.6.2-1.2.1-1.3-.1-.1-.3-.2-.6-.4z" />
                    </svg>
                </a>

                <!-- Email -->
                <a href="#" class="hover:text-[#9c0207] transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                        <path d="M2 4h20v16H2V4zm10 9 10-6H2l10 6zm0 2L2 9v9h20V9l-10 6z" />
                    </svg>
                </a>

            </div>

            <!-- Copyright -->
            <p class="text-gray-500 text-sm">
                © 2026 Votre Entreprise. Tous droits réservés.
            </p>

        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script src="script/script.js"></script>
    <script src="script/caroussel.js"></script>

</body>

</html>
